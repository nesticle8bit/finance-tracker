<div class="kpi-card">
  <div class="kpi-card__accent" [style.background]="iconColor"></div>
  <div class="kpi-card__body">
    <div class="kpi-card__top">
      <span class="kpi-card__label">{{ label }}</span>
      <div class="kpi-card__icon" [style.background]="iconBg">
        <mat-icon class="icon-sm" [style.color]="iconColor">{{ icon }}</mat-icon>
      </div>
    </div>
    <p class="kpi-card__value">{{ value }}</p>
    <p class="kpi-card__sub">{{ sub }}</p>
  </div>
</div>
