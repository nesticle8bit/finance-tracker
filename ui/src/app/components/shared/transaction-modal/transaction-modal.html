<div class="txn-modal">

  <!-- Header -->
  <div class="txn-modal__header">
    <div style="display:flex; align-items:center; gap:14px;">
      <div class="txn-modal__hdr-icon">
        <mat-icon>{{ isEdit ? 'edit_note' : 'add_card' }}</mat-icon>
      </div>
      <div>
        <h2 class="txn-modal__title">{{ title }}</h2>
        <p class="txn-modal__subtitle">
          {{ isEdit ? 'Modifica los datos de este movimiento' : 'Registra un ingreso o gasto' }}
        </p>
      </div>
    </div>
    <button class="btn-ghost-close" (click)="close()">
      <mat-icon>close</mat-icon>
    </button>
  </div>

  <!-- Type tabs (create only) -->
  @if (!isEdit) {
    <div class="txn-modal__tabs">
      <button class="txn-tab" [class.txn-tab--active-expense]="activeTab === 'expense'" (click)="setTab('expense')">
        <div class="txn-tab__icon txn-tab__icon--expense">
          <mat-icon>trending_up</mat-icon>
        </div>
        Gasto
      </button>
      <button class="txn-tab" [class.txn-tab--active-income]="activeTab === 'income'" (click)="setTab('income')">
        <div class="txn-tab__icon txn-tab__icon--income">
          <mat-icon>trending_down</mat-icon>
        </div>
        Ingreso
      </button>
    </div>
  } @else {
    <div style="margin-bottom:20px;">
      <span class="badge" [class.badge-income]="activeTab === 'income'" [class.badge-expense]="activeTab === 'expense'">
        {{ activeTab === 'income' ? '↓ Ingreso' : '↑ Gasto' }}
      </span>
    </div>
  }

  <!-- Amount hero -->
  <div class="txn-modal__amount-wrap"
    [class.txn-modal__amount--expense]="activeTab === 'expense'"
    [class.txn-modal__amount--income]="activeTab === 'income'">
    <span class="txn-modal__currency">COP $</span>
    <input class="txn-modal__amount-input" type="number" [(ngModel)]="form.amount" placeholder="0" min="0">
  </div>

  <!-- Form fields -->
  <div class="txn-modal__form">

    <!-- Date + Time -->
    <div class="txn-modal__datetime">
      <div>
        <label class="form-label">Fecha</label>
        <app-date-picker [(value)]="form.date" />
      </div>
      <div>
        <label class="form-label">Hora</label>
        <input class="input-field" type="time" [(ngModel)]="form.time">
      </div>
    </div>

    <!-- Description -->
    <div>
      <label class="form-label">Descripción</label>
      <input class="input-field" type="text" [(ngModel)]="form.desc" placeholder="Ej: Almuerzo, Salario...">
    </div>

    <!-- Category -->
    <div style="position:relative;">
      <label class="form-label">Categoría</label>
      <button type="button" class="picker-btn" (click)="catOpen = !catOpen"
        [style.border-color]="catOpen ? '#14b8a6' : 'rgba(255,255,255,0.12)'">
        @if (selectedCat) {
          <div class="icon-box-xxs" [style.background]="selectedCat.color + '25'">
            <mat-icon class="icon-xs" [style.color]="selectedCat.color">{{ selectedCat.icon }}</mat-icon>
          </div>
          <span [style.color]="selectedCat.color" class="picker-selected-text">{{ selectedCat.name }}</span>
        } @else {
          <span class="text-dim picker-placeholder">Seleccionar categoría...</span>
        }
        <mat-icon class="icon-md text-dim" style="transition:transform .2s; margin-left:auto;"
          [style.transform]="catOpen ? 'rotate(180deg)' : 'rotate(0)'">expand_more</mat-icon>
      </button>

      @if (catOpen) {
        <div class="cat-dropdown-panel">
          @for (cat of filteredCategories; track cat.id) {
            <button type="button" class="dropdown-item" (click)="selectCat(cat)"
              [style.background]="form.categoryId === cat.id ? 'rgba(20,184,166,0.12)' : 'transparent'">
              <div class="icon-box-xs" [style.background]="cat.color + '25'">
                <mat-icon class="icon-sm" [style.color]="cat.color">{{ cat.icon }}</mat-icon>
              </div>
              <span class="dropdown-item-text"
                [style.color]="form.categoryId === cat.id ? cat.color : 'rgba(255,255,255,0.8)'">
                {{ cat.name }}
              </span>
              @if (form.categoryId === cat.id) {
                <mat-icon class="icon-sm text-teal" style="margin-left:auto;">check</mat-icon>
              }
            </button>
          }
        </div>
        <div class="overlay-close" style="z-index:199;" (click)="catOpen = false"></div>
      }
    </div>

  </div>

  <!-- Actions -->
  <div class="txn-modal__actions">
    <button class="btn-cancel" (click)="close()">Cancelar</button>
    <button class="btn-primary btn-save" (click)="save()" [disabled]="saving()">
      @if (saving()) {
        <mat-icon class="icon-md spin">refresh</mat-icon>
      } @else {
        <mat-icon class="icon-md">{{ isEdit ? 'save' : 'check' }}</mat-icon>
      }
      {{ saving() ? 'Guardando...' : saveLabel }}
    </button>
  </div>

</div>
