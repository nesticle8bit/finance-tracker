services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - finance_net
    environment:
      - DB_CONNECTION_STRING=${DB_CONNECTION_STRING}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ISSUER=${JWT_ISSUER}
      - JWT_AUDIENCE=${JWT_AUDIENCE}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - PORT=5197

  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    restart: unless-stopped
    networks:
      - finance_net
    ports:
      - "${UI_PORT:-5011}:80"
    depends_on:
      - api

networks:
  finance_net:
    driver: bridge
