services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    environment:
      - DB_CONNECTION_STRING=${DB_CONNECTION_STRING}
      - JWT_SECRET=${JWT_SECRET}
      - JWT_ISSUER=${JWT_ISSUER}
      - JWT_AUDIENCE=${JWT_AUDIENCE}
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS}
      - PORT=5197
    restart: unless-stopped

  ui:
    build:
      context: ./ui
      dockerfile: Dockerfile
    ports:
      - "${UI_PORT}:80"
    depends_on:
      - api
    restart: unless-stopped
